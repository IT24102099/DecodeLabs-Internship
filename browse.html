<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Browse Issues | CivicFix</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- Navbar -->

    <header>

    </header>

    <main>

        <section id="browse-header">

    <div class="container">

        <div class="section-header">

            <h1>Browse Public Issues</h1>

            <p>

                Search and explore reported community issues across multiple cities.

            </p>

        </div>

    </div>

</section>

        <section id="browse-filters">

    <div class="container">

        <div class="filter-bar">

            <!-- Search -->

            <div class="search-box">

                <input
                    type="text"
                    placeholder="Search issues...">

            </div>

            <!-- Filters -->

            <div class="filter-group">

                <select>

                    <option>All Cities</option>
                    <option>Colombo</option>
                    <option>Kandy</option>
                    <option>Jaffna</option>

                </select>

                <select>

                    <option>All Categories</option>
                    <option>Roads</option>
                    <option>Water Supply</option>
                    <option>Electricity</option>
                    <option>Waste</option>

                </select>

                <select>

                    <option>All Status</option>
                    <option>Pending</option>
                    <option>In Progress</option>
                    <option>Resolved</option>

                </select>

                <select>

                    <option>Newest First</option>
                    <option>Oldest First</option>

                </select>

            </div>

        </div>

    </div>

</section>

        <section id="browse-results"></section>

        <section id="pagination"></section>

    </main>

    <footer></footer>

</body>

</html>
